<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrGY — Ultimate Edition</title>
    
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen antialiased">
    <!-- Декоративные анимированные сферы -->
    <div class="blob" id="blob-1"></div>
    <div class="blob" id="blob-2"></div>

    <nav class="fixed top-0 w-full z-50 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-panel rounded-[2rem] px-8 py-4">
            <div class="text-2xl font-black tracking-tighter hero-title cursor-pointer" onclick="app.reset()">
                CINEMA<span class="text-white">GOLD</span>
            </div>
            <div class="flex items-center gap-8">
                <button onclick="app.toggleWatchlistMode()" class="group flex items-center gap-3 font-bold">
                    <span id="watchlistCount" class="bg-indigo-600 text-[10px] px-2 py-0.5 rounded-full transition-transform group-hover:scale-110">0</span>
                    <span class="tracking-widest text-sm opacity-70 group-hover:opacity-100">MY LIST</span>
                </button>
                <button onclick="app.toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-full glass-panel hover:bg-white/10 transition-all">🌓</button>
            </div>
        </div>
    </nav>

    <header class="pt-52 pb-20 px-6 text-center">
        <h1 class="hero-title text-7xl md:text-9xl mb-8 font-black">Посмотрел и Одобряю</h1>
        <p class="text-gray-500 font-medium tracking-[0.4em] uppercase text-xs mb-16 fade-in">The Gold Standard of Cinematography</p>
        
        <div class="max-w-3xl mx-auto flex flex-col gap-8 items-center">
            <input type="text" id="mainSearch" oninput="app.handleSearch(this.value)" placeholder="Найти шедевр..." 
                class="w-full glass-panel px-10 py-6 rounded-full outline-none focus:ring-2 focus:ring-indigo-500/50 text-xl transition-all shadow-2xl">
            <div class="flex flex-wrap justify-center gap-3" id="genreFilters"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-40 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12" id="movieContainer"></main>

    <!-- Премиальное модальное окно -->
    <div id="fullModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-2xl" onclick="app.closeModal()"></div>
        <div class="relative max-w-6xl w-full glass-panel rounded-[3rem] overflow-hidden reveal shadow-2xl">
            <button onclick="app.closeModal()" class="absolute top-8 right-8 text-4xl font-light hover:rotate-90 transition-transform z-50">&times;</button>
            <div id="modalContent" class="max-h-[85vh] overflow-y-auto"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
