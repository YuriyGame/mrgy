<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Cinema</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Фоновые световые пятна -->
  <div class="bg-blobs" aria-hidden="true">
    <div id="blob-1" class="blob blob-1"></div>
    <div id="blob-2" class="blob blob-2"></div>
  </div>

  <div class="page-shell">
    <!-- Header -->
    <header class="header-wrap glass-panel">
      <div class="header-top">
        <div>
          <h1 class="brand-title">GOLD CINEMA</h1>
          <p class="brand-subtitle">Твоя стильная коллекция фильмов</p>
        </div>

        <div class="header-actions">
          <button class="icon-btn" onclick="app.toggleWatchlistMode()" title="Показать мой список">
            <span>★</span>
            <span class="watch-count" id="watchlistCount">0</span>
          </button>

          <button class="icon-btn" onclick="app.toggleTheme()" title="Сменить тему">
            <span>☼</span>
          </button>
        </div>
      </div>

      <!-- Поиск -->
      <div class="search-row">
        <div class="search-wrap">
          <input
            id="mainSearch"
            type="text"
            placeholder="Поиск фильма..."
            oninput="app.handleSearch(this.value)"
            class="search-input"
          />
          <button class="reset-btn" onclick="app.reset()">Сбросить</button>
        </div>
      </div>

      <!-- Жанры -->
      <div id="genreFilters" class="genre-wrap"></div>
    </header>

    <!-- Grid фильмов -->
    <main>
      <div id="movieContainer" class="movies-grid"></div>
    </main>
  </div>

  <!-- Модальное окно -->
  <div id="fullModal" class="modal-overlay hidden" onclick="if(event.target.id === 'fullModal') app.closeModal()">
    <div class="modal-shell glass-panel">
      <button onclick="app.closeModal()" class="close-modal-btn" aria-label="Закрыть">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
